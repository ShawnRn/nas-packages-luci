name: Build QuickStart IPK

on:
  push:
    branches: [ main ]
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86-64
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/x86/64/openwrt-sdk-24.10.0-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - target: mediatek-filogic
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/mediatek/filogic/openwrt-sdk-24.10.0-mediatek-filogic_gcc-13.3.0_musl.Linux-x86_64.tar.zst
          - target: ipq40xx-generic
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/ipq40xx/generic/openwrt-sdk-24.10.0-ipq40xx-generic_gcc-13.3.0_musl_eabi.Linux-x86_64.tar.zst
          - target: ath79-generic
            sdk_url: https://downloads.openwrt.org/releases/24.10.0/targets/ath79/generic/openwrt-sdk-24.10.0-ath79-generic_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    steps:
      - uses: actions/checkout@v4

      - name: Install SDK prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3 rsync unzip zlib1g-dev file wget ca-certificates zstd

      - name: Download OpenWrt SDK
        run: |
          mkdir -p "$RUNNER_TEMP/sdk"
          wget -O "$RUNNER_TEMP/sdk/sdk.tar.zst" "${{ matrix.sdk_url }}"
          tar --zstd -xf "$RUNNER_TEMP/sdk/sdk.tar.zst" -C "$RUNNER_TEMP/sdk"
          sdk_dir="$(find "$RUNNER_TEMP/sdk" -mindepth 1 -maxdepth 1 -type d | head -n 1)"
          echo "SDK_DIR=$sdk_dir" >> "$GITHUB_ENV"

      - name: Stage package sources
        run: |
          mkdir -p "$SDK_DIR/package/codex"
          git clone --depth 1 https://github.com/linkease/istore.git "$RUNNER_TEMP/istore"
          git clone --depth 1 https://github.com/linkease/nas-packages.git "$RUNNER_TEMP/nas-packages"
          cp -R "$GITHUB_WORKSPACE/luci/luci-app-quickstart" "$SDK_DIR/package/codex/"
          cp -R "$RUNNER_TEMP/istore/luci/luci-app-store" "$SDK_DIR/package/codex/"
          cp -R "$RUNNER_TEMP/istore/luci/luci-lib-taskd" "$SDK_DIR/package/codex/"
          cp -R "$RUNNER_TEMP/istore/luci/luci-lib-xterm" "$SDK_DIR/package/codex/"
          cp -R "$RUNNER_TEMP/istore/luci/taskd" "$SDK_DIR/package/codex/"
          cp -R "$RUNNER_TEMP/nas-packages/network/services/quickstart" "$SDK_DIR/package/codex/"
          find "$SDK_DIR/package/codex" -maxdepth 1 -mindepth 1 -type d -print | sort

      - name: Update feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build QuickStart package set
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make defconfig
          make \
            package/quickstart/compile \
            package/taskd/compile \
            package/luci-lib-xterm/compile \
            package/luci-lib-taskd/compile \
            package/luci-app-store/compile \
            package/luci-app-quickstart/compile \
            V=s

      - name: Collect artifacts
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist/${{ matrix.target }}"
          find "$SDK_DIR/bin/packages" \
            \( -name 'quickstart*.ipk' \
            -o -name 'taskd*.ipk' \
            -o -name 'luci-lib-xterm*.ipk' \
            -o -name 'luci-lib-taskd*.ipk' \
            -o -name 'luci-app-store*.ipk' \
            -o -name 'luci-app-quickstart*.ipk' \) \
            -exec cp {} "$GITHUB_WORKSPACE/dist/${{ matrix.target }}/" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: quickstart-${{ matrix.target }}
          path: dist/${{ matrix.target }}/*
